<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lemming Impact Assessment Estimator</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #1a1a2e;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                font-family: "Courier New", monospace;
                color: #e0e0e0;
                overflow: hidden;
            }
            h1 {
                font-size: 1.4rem;
                color: #f0c040;
                text-shadow: 2px 2px #000;
                margin-bottom: 12px;
            }
            #canvas {
                background: #2a2a4a;
                border: 3px solid #505070;
                border-radius: 6px;
                display: block;
                max-width: 95vw;
            }
            #controls {
                display: flex;
                gap: 16px;
                margin-top: 16px;
                align-items: center;
                flex-wrap: wrap;
                justify-content: center;
            }
            button {
                font-family: "Courier New", monospace;
                font-size: 1.1rem;
                font-weight: bold;
                padding: 10px 28px;
                background: #e04040;
                color: #fff;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                transition: background 0.15s;
                text-transform: uppercase;
                letter-spacing: 2px;
            }
            button:hover {
                background: #ff5050;
            }
            button:active {
                background: #c03030;
            }
            button:disabled {
                background: #555;
                cursor: default;
            }
            #result {
                font-size: 2rem;
                font-weight: bold;
                color: #60e060;
                min-height: 2.4rem;
                text-shadow: 0 0 8px #2a2;
            }
            #info {
                font-size: 0.85rem;
                color: #8888aa;
                margin-top: 8px;
            }
            #gunpowder-group {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin: 0 12px;
            }
            #gunpowder-group label {
                font-family: "Courier New", monospace;
                font-size: 0.85rem;
                color: #f0c040;
                margin-bottom: 4px;
            }
            input[type="range"] {
                -webkit-appearance: none;
                appearance: none;
                width: 180px;
                height: 6px;
                background: #505070;
                border-radius: 3px;
                outline: none;
            }
            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                width: 18px;
                height: 18px;
                background: #e04040;
                border-radius: 50%;
                cursor: pointer;
            }
            input[type="range"]::-moz-range-thumb {
                width: 18px;
                height: 18px;
                background: #e04040;
                border-radius: 50%;
                cursor: pointer;
                border: none;
            }
            #gunpowder-val {
                font-family: "Courier New", monospace;
                font-size: 0.9rem;
                color: #60e060;
                margin-top: 2px;
            }
            /* --- Explosion Animations --- */
            @keyframes pageShake {
                0%, 100% { transform: translate(0, 0); }
                10% { transform: translate(-8px, -4px); }
                20% { transform: translate(8px, -4px); }
                30% { transform: translate(-8px, 4px); }
                40% { transform: translate(8px, 4px); }
                50% { transform: translate(-4px, 0); }
                60% { transform: translate(4px, 0); }
                70% { transform: translate(-2px, 2px); }
                80% { transform: translate(2px, -2px); }
                90% { transform: translate(-1px, 1px); }
            }
            @keyframes pageExplode {
                0% { opacity: 1; transform: scale(1) rotate(0deg); }
                50% { opacity: 0.5; transform: scale(1.5) rotate(180deg); filter: brightness(3); }
                100% { opacity: 0; transform: scale(0); }
            }
            body.exploding {
                animation: pageShake 0.5s ease-in-out 3, pageExplode 1.5s 1.5s forwards;
            }
        </style>
    </head>
    <body>
        <h1>🔫 Lemming Impact Assessment Estimator<</h1>
        <canvas id="canvas" width="800" height="450"></canvas>
        <div id="controls">
            <button id="fireBtn">💥 IMPACT!</button>
            <div id="gunpowder-group">
                <label for="gunpowder">
                    <span id="gunpowder-label">Gunpowder Barrels</span>
                </label>
                <input type="range" id="gunpowder" min="1" max="10" value="5" step="1" />
                <div id="gunpowder-val">Size: M</div>
            </div>
            <div id="result"></div>
        </div>
        <div id="info">
            Launch 120 lemmings to <em>impact</em> the wall. The number that hit
            = your IA (Impact Assessment) estimate (0–120). <br /><em
                >Adjust the T-shirt-sized gunpowder to control velocity!</em>
            >
        </div>

        <script>
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");
            const fireBtn = document.getElementById("fireBtn");
            const resultEl = document.getElementById("result");

            // --- Constants ---
            const LEMMING_COUNT = 120;
            const GRAVITY = 0.08;
            const CANON_X = 60;
            const CANON_Y = 350;
            const WALL_X = 700;
            const WALL_W = 30;
            const WALL_H = 300;
            const WALL_BASE_Y = CANON_Y;

            // Lemming palette (Psygnosis style)
            const COLORS = {
                skin: "#f0c070",
                shirt: "#4080e0",
                overalls: "#3050a0",
                hair: "#604020",
                boot: "#302010",
                hat: "#503020",
            };

            let lemmings = [];
            let animating = false;
            let hitCount = 0;
            let frameId = null;

            // --- Lemming Sprite Drawing ---
            function drawLemming(x, y, angle, idx) {
                const s = 12; // sprite size
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);

                // Body (overalls)
                ctx.fillStyle = COLORS.overalls;
                ctx.fillRect(-s / 2, -s / 4, s, s / 2);

                // Shirt
                ctx.fillStyle = COLORS.shirt;
                ctx.fillRect(-s / 2, -s, s, s * 0.6);

                // Head
                ctx.fillStyle = COLORS.skin;
                ctx.beginPath();
                ctx.arc(0, -s * 0.6, s * 0.35, 0, Math.PI * 2);
                ctx.fill();

                // Hair
                ctx.fillStyle = COLORS.hair;
                ctx.fillRect(-s * 0.35, -s * 1.15, s * 0.7, s * 0.25);

                // Legs (simple walking animation based on idx + frame)
                const legPhase = Math.sin(idx * 0.5);
                ctx.fillStyle = COLORS.boot;
                ctx.fillRect(-s * 0.25, s * 0.15, s * 0.2, s * 0.3);
                ctx.fillRect(s * 0.05, s * 0.15, s * 0.2, s * 0.3);

                // Arms
                ctx.fillStyle = COLORS.skin;
                ctx.fillRect(-s * 0.55, -s * 0.7, s * 0.2, s * 0.5);
                ctx.fillRect(s * 0.35, -s * 0.7, s * 0.2, s * 0.5);

                // Eyes
                ctx.fillStyle = "#101010";
                ctx.fillRect(s * 0.05, -s * 0.75, 2, 2);

                ctx.restore();
            }

            // --- Cannon Drawing ---
            function drawCannon() {
                // Barrel — rotated to point RIGHT, mounted on the carriage
                ctx.save();
                ctx.translate(CANON_X, CANON_Y - 15);
                ctx.rotate(-Math.PI / 2);
                ctx.fillStyle = "#555";
                ctx.fillRect(-10, -40, 20, 80);
                ctx.restore();

                // Base / carriage
                ctx.fillStyle = "#444";
                ctx.fillRect(CANON_X - 30, CANON_Y - 10, 60, 10);

                // Wheels
                ctx.fillStyle = "#333";
                ctx.beginPath();
                ctx.arc(CANON_X - 20, CANON_Y, 8, 0, Math.PI * 2);
                ctx.arc(CANON_X + 20, CANON_Y, 8, 0, Math.PI * 2);
                ctx.fill();
            }

            // --- Wall Drawing ---
            function drawWall() {
                ctx.fillStyle = "#606060";
                ctx.fillRect(WALL_X, WALL_BASE_Y - WALL_H, WALL_W, WALL_H);

                // Brick pattern
                ctx.strokeStyle = "#404040";
                ctx.lineWidth = 1;
                for (
                    let by = WALL_BASE_Y - WALL_H;
                    by < WALL_BASE_Y;
                    by += 20
                ) {
                    ctx.beginPath();
                    ctx.moveTo(WALL_X, by);
                    ctx.lineTo(WALL_X + WALL_W, by);
                    ctx.stroke();
                    let offset =
                        (Math.floor((WALL_BASE_Y - WALL_H - by) / 20) % 2) * 15;
                    ctx.beginPath();
                    ctx.moveTo(WALL_X + 15 + offset, by);
                    ctx.lineTo(WALL_X + 15 + offset, by + 20);
                    ctx.stroke();
                }
            }

            // --- Blood Splatters ---
            let bloodSplats = [];

            function addBloodSplat(y) {
                bloodSplats.push({
                    x: WALL_X,
                    y: y,
                    r: 4 + Math.random() * 8,
                });
                // Cap splats so we don't slow down rendering
                if (bloodSplats.length > 120) {
                    bloodSplats.shift();
                }
            }

            function drawBloodSplats() {
                for (const s of bloodSplats) {
                    ctx.save();
                    ctx.fillStyle = "#a01010";
                    ctx.globalAlpha = 0.85;
                    // Irregular splat shape using multiple circles
                    ctx.beginPath();
                    ctx.arc(s.x + 5, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(s.x + 10, s.y - s.r * 0.4, s.r * 0.6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(s.x + 3, s.y + s.r * 0.5, s.r * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // --- T-Shirt Sizing ---
            const TSHIRT_SIZES = ["", "XS", "S", "S", "M", "M", "M", "L", "L", "XL", "XL"];

            // Gunpowder slider → velocity multiplier
            function getVelocityMultiplier() {
                const val = parseInt(gunpowderSlider.value, 10);
                // Map 1-10 to velocity range: 1→0.9x, 10→4x
                return 0.9 + (val - 1) * 0.34;
            }

            function updateGunpowderLabel() {
                const val = parseInt(gunpowderSlider.value, 10);
                const size = TSHIRT_SIZES[val];
                gunpowderVal.textContent = "Size: " + size;
                gunpowderLabel.textContent = "Gunpowder Barrels (" + size + ")";
            }

            // --- Lemming Class ---
            class Lemming {
                constructor(idx) {
                    this.idx = idx;
                    this.x = CANON_X + 40; // end of horizontal barrel
                    this.y = CANON_Y;
                    this.prevX = this.x;
                    const mult = getVelocityMultiplier();
                    // Base vx range 3-8, multiplied by gunpowder
                    this.vx = (3 + Math.random() * 5) * mult;
                    this.vy = -(1 + Math.random() * 7);
                    this.angle = Math.atan2(this.vy, this.vx);
                    this.active = false;
                    this.hit = false;
                    this.bounced = false;
                    this.launchFrame = idx * 0.5; // stagger: 0.5 frames per lemming
                    this.frame = 0;
                }

                update() {
                    if (!this.active && this.frame >= this.launchFrame) {
                        this.active = true;
                    }
                    if (!this.active) {
                        this.frame++;
                        return;
                    }

                    this.vy += GRAVITY;
                    this.prevX = this.x;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.angle = Math.atan2(this.vy, this.vx);

                    // Wall collision
                    if (
                        !this.hit &&
                        this.x >= WALL_X &&
                        this.x < WALL_X + WALL_W &&
                        this.y >= WALL_BASE_Y - WALL_H &&
                        this.y <= WALL_BASE_Y
                    ) {
                        this.hit = true;
                        this.active = false;
                        addBloodSplat(this.y);
                        return;
                    }

                    // Tunneling check: fast lemming skipped past the wall zone in one frame
                    if (
                        !this.hit &&
                        !this.bounced &&
                        this.prevX < WALL_X &&
                        this.x >= WALL_X &&
                        this.y >= WALL_BASE_Y - WALL_H &&
                        this.y <= WALL_BASE_Y
                    ) {
                        this.hit = true;
                        this.active = false;
                        addBloodSplat(this.y);
                        return;
                    }

                    // Missed the wall — bounce away
                    if (
                        !this.hit &&
                        !this.bounced &&
                        this.x > WALL_X + WALL_W
                    ) {
                        this.bounced = true;
                        this.vx = -Math.abs(this.vx) * 0.6;
                    }

                    // Off screen
                    if (
                        this.x < -30 ||
                        this.y > canvas.height + 30 ||
                        (this.bounced && this.x < -30)
                    ) {
                        this.active = false;
                    }
                }

                draw() {
                    if (!this.active) return;
                    drawLemming(this.x, this.y, this.angle, this.idx);
                }
            }

            // --- Explosion Effects ---
            let explosionParticles = [];
            let explosionActive = false;
            let explosionPhase = 0; // 0=idle, 1=wall explodes, 2=page explodes
            let explosionFrame = 0;
            const EXPLOSION_WALL_DURATION = 60; // frames for wall explosion
            const EXPLOSION_PAGE_DELAY = 30; // frames before page explodes

            function triggerExplosion() {
                explosionActive = true;
                explosionPhase = 1;
                explosionFrame = 0;
                // Create wall explosion particles
                for (let i = 0; i < 80; i++) {
                    explosionParticles.push({
                        x: WALL_X + WALL_W / 2 + (Math.random() - 0.5) * WALL_W,
                        y: WALL_BASE_Y - WALL_H / 2 + (Math.random() - 0.5) * WALL_H,
                        vx: (Math.random() - 0.5) * 12,
                        vy: -(Math.random() * 8),
                        size: 3 + Math.random() * 6,
                        life: 80 + Math.random() * 40,
                        color: Math.random() > 0.5 ? "#e04040" : "#f0c040",
                    });
                }
            }

            function updateExplosion() {
                if (!explosionActive) return;

                explosionFrame++;

                // Wall explosion phase
                if (explosionPhase === 1 && explosionFrame >= EXPLOSION_WALL_DURATION) {
                    explosionPhase = 2;
                    // Trigger page explosion
                    document.body.classList.add("exploding");
                }

                // Update particles
                for (let i = explosionParticles.length - 1; i >= 0; i--) {
                    const p = explosionParticles[i];
                    p.vy += 0.15; // gravity on particles
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    if (p.life <= 0) {
                        explosionParticles.splice(i, 1);
                    }
                }
            }

            function drawExplosion() {
                // White flash during wall explosion
                if (explosionPhase === 1 && explosionFrame < 10) {
                    ctx.save();
                    ctx.globalAlpha = 1 - (explosionFrame / 10) * 0.7;
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(WALL_X - 20, WALL_BASE_Y - WALL_H - 20, WALL_W + 40, WALL_H + 40);
                    ctx.restore();
                }

                for (const p of explosionParticles) {
                    ctx.save();
                    ctx.globalAlpha = Math.max(0, p.life / 120);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
                    ctx.restore();
                }
            }

            // --- Main Render ---
            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Sky gradient
                const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, "#1a1a3a");
                grad.addColorStop(1, "#2a2a5a");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Ground
                ctx.fillStyle = "#3a5a2a";
                ctx.fillRect(
                    0,
                    WALL_BASE_Y,
                    canvas.width,
                    canvas.height - WALL_BASE_Y,
                );

                drawCannon();
                if (explosionPhase !== 1) drawWall(); // hide wall during explosion
                drawBloodSplats();
                drawExplosion();
                updateExplosion();

                for (const l of lemmings) {
                    l.update();
                    l.draw();
                }

                // Update hit count
                hitCount = lemmings.filter((l) => l.hit).length;

                const activeCount = lemmings.filter((l) => l.active).length;

                if (activeCount === 0 && lemmings.length > 0 && !explosionActive) {
                    let quip = "";
                    if (hitCount <= 15)
                        quip = "Minimal impact — barely a scratch!";
                    else if (hitCount <= 40)
                        quip = "Moderate impact — a decent dent!";
                    else if (hitCount <= 70)
                        quip = "Significant impact — the wall is stressed!";
                    else if (hitCount <= 99)
                        quip = "Massive impact — the wall is in trouble!";
                    else quip = "💥 CATASTROPHIC IMPACT — the wall will NOT survive this!";

                    if (hitCount >= 100 && !explosionActive) {
                        // Trigger explosion sequence
                        triggerExplosion();
                        resultEl.textContent = hitCount + " — " + quip;
                        frameId = requestAnimationFrame(render);
                        return; // Continue animating for explosion
                    }

                    resultEl.textContent = hitCount + " — " + quip;
                    fireBtn.disabled = false;
                    animating = false;
                    frameId = null;
                    return;
                }

                // Continue animation for explosion
                if (explosionActive && (explosionPhase === 1 || explosionPhase === 2)) {
                    if (explosionPhase === 2 && explosionFrame > EXPLOSION_WALL_DURATION + EXPLOSION_PAGE_DELAY + 90) {
                        // Explosion finished
                        animating = false;
                        frameId = null;
                        return;
                    }
                }

                frameId = requestAnimationFrame(render);
            }

            // --- Fire Handler ---
            function fireLemmings() {
                if (animating) return;
                animating = true;
                fireBtn.disabled = true;
                resultEl.textContent = "";
                hitCount = 0;

                // Reset explosion state
                explosionActive = false;
                explosionPhase = 0;
                explosionFrame = 0;
                explosionParticles = [];
                document.body.classList.remove("exploding");

                // Cancel any pending animation frame
                if (frameId !== null) {
                    cancelAnimationFrame(frameId);
                    frameId = null;
                }

                // Clear old blood splats
                bloodSplats = [];

                lemmings = [];
                for (let i = 0; i < LEMMING_COUNT; i++) {
                    lemmings.push(new Lemming(i));
                }

                render();
            }

            // --- Init ---
            const gunpowderSlider = document.getElementById("gunpowder");
            const gunpowderVal = document.getElementById("gunpowder-val");
            const gunpowderLabel = document.getElementById("gunpowder-label");

            gunpowderSlider.addEventListener("input", updateGunpowderLabel);
            updateGunpowderLabel(); // set initial label
            fireBtn.addEventListener("click", fireLemmings);

            // Initial render
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, "#1a1a3a");
            grad.addColorStop(1, "#2a2a5a");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#3a5a2a";
            ctx.fillRect(
                0,
                WALL_BASE_Y,
                canvas.width,
                canvas.height - WALL_BASE_Y,
            );
            drawCannon();
            drawWall();
        </script>
    </body>
</html>
